name: Auto Watcher

on:
  workflow_dispatch:
  repository_dispatch:
    types: [trigger-watcher]

concurrency:
  group: watcher
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Run watcher
        run: python watcher.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          CONTACT_PHONE: ${{ secrets.CONTACT_PHONE }}

      - name: Commit seen.json
        continue-on-error: true
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          if git diff --cached --quiet; then
            echo "Keine Änderungen, nichts zu committen"
            exit 0
          fi
          git commit -m "update seen.json [skip ci]"
          
          for attempt in 1 2 3; do
            if git pull --rebase --strategy-option=theirs 2>&1; then
              if git push; then
                echo "Push erfolgreich nach Versuch $attempt"
                exit 0
              fi
            fi
            echo "Versuch $attempt fehlgeschlagen, retry in 5s..."
            git rebase --abort 2>/dev/null || true
            sleep 5
          done
          
          echo "Push nach 3 Versuchen nicht möglich, nächster Lauf versucht es wieder"
          exit 0
